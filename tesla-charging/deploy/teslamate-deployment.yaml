apiVersion: apps/v1
kind: Deployment
metadata:
  name: teslamate
  labels:
    app: teslamate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teslamate
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: teslamate
    spec:
      containers:
        - name: teslamate
          # pin a version tag after the first successful deploy
          image: teslamate/teslamate:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_USER
              value: teslamate
            - name: DATABASE_NAME
              value: teslamate
            - name: DATABASE_HOST
              value: teslamate-postgres
            - name: MQTT_HOST
              value: mosquitto
            - name: TZ
              value: Europe/Helsinki
          envFrom:
            # ENCRYPTION_KEY + DATABASE_PASS, see teslamate-secret.example.yaml
            - secretRef:
                name: teslamate
          ports:
            - containerPort: 4000
              protocol: TCP
          resources:
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
