# Copy to teslamate-secret.yaml, insert real values, then:
#   sops --encrypt --in-place tesla-charging/deploy/teslamate-secret.yaml
# ENCRYPTION_KEY: any long random string (encrypts the Tesla tokens at rest);
# generate with e.g.: openssl rand -base64 32
apiVersion: v1
kind: Secret
metadata:
  name: teslamate
  labels:
    app: teslamate
type: Opaque
stringData:
  ENCRYPTION_KEY: REPLACE_ME_RANDOM_STRING
  DATABASE_PASS: REPLACE_ME_DB_PASSWORD
