# Copy to proxy-secret.yaml, insert the real private key (runbook step 3),
# then: sops --encrypt --in-place tesla-charging/deploy/proxy-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: tesla-fleet-key
  labels:
    app: tesla-http-proxy
type: Opaque
stringData:
  fleet-private-key.pem: |
    -----BEGIN EC PRIVATE KEY-----
    REPLACE_ME_WITH_REAL_PRIVATE_KEY
    -----END EC PRIVATE KEY-----
