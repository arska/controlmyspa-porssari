# Copy to evcc-secret.yaml, paste the filled-in evcc config (keep in sync with
# ../evcc/evcc.example.yaml), then:
#   sops --encrypt --in-place tesla-charging/deploy/evcc-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: evcc-config
  labels:
    app: evcc
type: Opaque
stringData:
  evcc.yaml: |
    network:
      schema: https
      host: tesla.example.com
      port: 7070

    interval: 60s

    tariffs:
      currency: EUR
      grid:
        type: template
        template: nordpool
        region: FI
        currency: EUR

    vehicles:
      - name: tesla
        type: template
        template: tesla
        title: Tesla
        capacity: 75
        clientId: <TESLA_CLIENT_ID>
        accessToken: <TESLA_ACCESS_TOKEN>
        refreshToken: <TESLA_REFRESH_TOKEN>
        vin: <VIN>
        commandProxy: https://tesla-http-proxy.<NAMESPACE>.svc:4443
        cache: 15m

    chargers:
      - name: twc1
        type: template
        template: vehicle-api
        geofence_enabled: true
        lat: <HOME_LAT>
        lon: <HOME_LON>
        radius: 100

    loadpoints:
      - title: Home TWC
        charger: twc1
        vehicle: tesla
        mode: pv
        phases: 3
        maxCurrent: 16

    site:
      title: Home
