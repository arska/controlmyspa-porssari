apiVersion: v1
kind: Service
metadata:
  name: tesla-http-proxy
  labels:
    app: tesla-http-proxy
  annotations:
    # OpenShift issues a TLS cert for tesla-http-proxy.<namespace>.svc
    # into this secret; the Deployment mounts it at /tls.
    service.beta.openshift.io/serving-cert-secret-name: tesla-http-proxy-tls
spec:
  ports:
    - port: 4443
      protocol: TCP
      targetPort: 4443
  selector:
    app: tesla-http-proxy
