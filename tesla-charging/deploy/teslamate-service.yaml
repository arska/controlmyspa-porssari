# TeslaMate's web UI has no authentication — intentionally NOT exposed via
# Ingress. For the one-time Tesla token login and later maintenance use:
#   oc port-forward svc/teslamate 4000:4000
apiVersion: v1
kind: Service
metadata:
  name: teslamate
  labels:
    app: teslamate
spec:
  ports:
    - port: 4000
      protocol: TCP
      targetPort: 4000
  selector:
    app: teslamate
